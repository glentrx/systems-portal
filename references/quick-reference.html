<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Reference | Systems Portal</title>
  <meta
    name="description"
    content="Quick Reference page within the Systems Portal."
  />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header class="page-header">
    <div class="container">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../index.html">Home</a> &gt;
        <a href="index.html">References</a> &gt;
        <span>Quick Reference</span>
      </nav>

      <p class="site-eyebrow">Systems Portal</p>
      <h1>Quick Reference</h1>
      <p>
        Fast-access reference for core system, network, service, and log checks.
      </p>
      <a class="back-link" href="index.html">← Back to References</a>
    </div>
  </header>

  <main class="page-content">
    <div class="container">
      <pre id="playbookContent" class="playbook-text">Loading reference...</pre>
    </div>
  </main>

  <script>
    fetch("../data/references/quick-reference.txt")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Failed to load Quick Reference.");
        }
        return response.text();
      })
      .then((text) => {
        document.getElementById("playbookContent").textContent = text;
      })
      .catch(() => {
        document.getElementById("playbookContent").textContent =
          "Unable to load Quick Reference content.\n\n" +
          "Check that the file exists at:\n" +
          "../data/references/quick-reference.txt";
      });
  </script>
</body>
</html>
