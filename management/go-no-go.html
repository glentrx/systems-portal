<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go / No-Go Framework | Systems Portal</title>
  <meta
    name="description"
    content="Go / No-Go Framework page within the Systems Portal."
  />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header class="page-header">
    <div class="container">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../index.html">Home</a> &gt;
        <a href="index.html">Management</a> &gt;
        <span>Go / No-Go Framework</span>
      </nav>

      <p class="site-eyebrow">Systems Portal</p>
      <h1>Go / No-Go Framework</h1>
      <p>
        Structured decision support for determining whether deployment can proceed, proceed with conditions, or should pause.
      </p>
      <a class="back-link" href="index.html">← Back to Management</a>
    </div>
  </header>

  <main class="page-content">
    <div class="container">
      <pre id="playbookContent" class="playbook-text">Loading management item...</pre>
    </div>
  </main>

  <script>
    fetch("../data/management/go-no-go-framework.txt")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Failed to load Go / No-Go Framework.");
        }
        return response.text();
      })
      .then((text) => {
        document.getElementById("playbookContent").textContent = text;
      })
      .catch(() => {
        document.getElementById("playbookContent").textContent =
          "Unable to load Go / No-Go Framework content.\n\n" +
          "Check that the file exists at:\n" +
          "../data/management/go-no-go-framework.txt";
      });
  </script>
</body>
</html>
