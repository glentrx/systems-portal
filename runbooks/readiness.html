<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Readiness Assessment | Systems Portal</title>
  <meta
    name="description"
    content="Readiness Assessment page within the Systems Portal."
  />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header class="page-header">
    <div class="container">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../index.html">Home</a> &gt;
        <a href="index.html">Runbooks</a> &gt;
        <span>Readiness Assessment</span>
      </nav>

      <p class="site-eyebrow">Systems Portal</p>
      <h1>Readiness Assessment</h1>
      <p>
        Pre-deployment assessment of scope, resources, dependencies, security readiness, and overall proceed decision.
      </p>
      <a class="back-link" href="index.html">← Back to Runbooks</a>
    </div>
  </header>

  <main class="page-content">
    <div class="container">
      <pre id="playbookContent" class="playbook-text">Loading runbook...</pre>
    </div>
  </main>

  <script>
    fetch("../data/runbooks/readiness-assessment.txt")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Failed to load Readiness Assessment.");
        }
        return response.text();
      })
      .then((text) => {
        document.getElementById("playbookContent").textContent = text;
      })
      .catch(() => {
        document.getElementById("playbookContent").textContent =
          "Unable to load Readiness Assessment content.\n\n" +
          "Check that the file exists at:\n" +
          "../data/runbooks/readiness-assessment.txt";
      });
  </script>
</body>
</html>
