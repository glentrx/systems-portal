<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change &amp; Rollback Plan | Systems Portal</title>
  <meta
    name="description"
    content="Change and Rollback Plan page within the Systems Portal."
  />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header class="page-header">
    <div class="container">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="../index.html">Home</a> &gt;
        <a href="index.html">Runbooks</a> &gt;
        <span>Change &amp; Rollback Plan</span>
      </nav>

      <p class="site-eyebrow">Systems Portal</p>
      <h1>Change &amp; Rollback Plan</h1>
      <p>
        Stage-based rollback guidance for recovering from failed or incorrect deployment changes.
      </p>
      <a class="back-link" href="index.html">← Back to Runbooks</a>
    </div>
  </header>

  <main class="page-content">
    <div class="container">
      <pre id="playbookContent" class="playbook-text">Loading runbook...</pre>
    </div>
  </main>

  <script>
    fetch("../data/runbooks/rollback-plan.txt")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Failed to load Change & Rollback Plan.");
        }
        return response.text();
      })
      .then((text) => {
        document.getElementById("playbookContent").textContent = text;
      })
      .catch(() => {
        document.getElementById("playbookContent").textContent =
          "Unable to load Change & Rollback Plan content.\n\n" +
          "Check that the file exists at:\n" +
          "../data/runbooks/rollback-plan.txt";
      });
  </script>
</body>
</html>
