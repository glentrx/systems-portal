<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Command Prompt Playbook | Systems Portal</title>
<meta
name="description"
content="Command Prompt Playbook page within the Systems Portal."
/>
<link rel="stylesheet" href="../style.css" />
</head>
<body>
<header class="page-header">
<div class="container">
<p class="site-eyebrow">Systems Portal</p>
<h1>Command Prompt Playbook</h1>
<p>
Classic Windows command-line reference for troubleshooting, file operations,
networking checks, services, tasks, and utilities.
</p>
<a class="back-link" href="../index.html">← Back to Systems Portal</a>
</div>
</header>

<main class="page-content">
<div class="container">
<pre id="playbookContent" class="playbook-text">Loading playbook...</pre>
</div>
</main>

<script>
fetch("../data/command-prompt-playbook.txt")
.then((response) => {
if (!response.ok) {
throw new Error("Failed to load Command Prompt Playbook.");
}
return response.text();
})
.then((text) => {
document.getElementById("playbookContent").textContent = text;
})
.catch(() => {
document.getElementById("playbookContent").textContent =
"Unable to load Command Prompt Playbook content.\n\n" +
"Check that the file exists at:\n" +
"../data/command-prompt-playbook.txt";
});
</script>
</body>
</html>
