<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Golden Path Playbook | Systems Portal</title>
<meta
name="description"
content="Golden Path Playbook page within the Systems Portal."
/>
<link rel="stylesheet" href="../style.css" />
</head>
<body>
<header class="page-header">
<div class="container">
<p class="site-eyebrow">Systems Portal</p>
<h1>Golden Path Playbook</h1>
<p>
Day 1 deployment reference for offline infrastructure covering preparation,
build, configuration, integration, validation, handover, and automation opportunities.
</p>
<a class="back-link" href="../index.html">← Back to Systems Portal</a>
</div>
</header>

<main class="page-content">
<div class="container">
<pre id="playbookContent" class="playbook-text">Loading playbook...</pre>
</div>
</main>

<script>
fetch("../data/golden-path-playbook.txt")
.then((response) => {
if (!response.ok) {
throw new Error("Failed to load Golden Path Playbook.");
}
return response.text();
})
.then((text) => {
document.getElementById("playbookContent").textContent = text;
})
.catch(() => {
document.getElementById("playbookContent").textContent =
"Unable to load Golden Path Playbook content.\n\n" +
"Check that the file exists at:\n" +
"../data/golden-path-playbook.txt";
});
</script>
</body>
</html>
